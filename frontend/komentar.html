<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PopTube - Komentar</title>
</head>
<body>

  <h2>Tambah Komentar</h2>

  <form id="commentForm">
    <input type="number" id="id_user" placeholder="ID User" required><br><br>
    <input type="number" id="id_film" placeholder="ID Film" required><br><br>
    <textarea id="komentar" placeholder="Tulis komentar..." required></textarea><br><br>
    <button type="submit">Kirim</button>
  </form>

  <h2>List Komentar</h2>
  <button onclick="loadComments()">Load Komentar</button>

  <ul id="commentList"></ul>

  <script>
  const API_URL = "http://localhost:3000/api/comments";

  // 🔹 LOAD KOMENTAR
  function loadComments() {
    const filmId = document.getElementById("id_film").value;

    if (!filmId) {
      alert("Isi ID Film dulu!");
      return;
    }

    fetch(`${API_URL}/${filmId}`)
      .then(res => res.json())
      .then(data => {
        console.log("DATA:", data);

        const list = document.getElementById("commentList");
        list.innerHTML = "";

        if (data.length === 0) {
          list.innerHTML = "<li>Tidak ada komentar</li>";
          return;
        }

        data.forEach(item => {
          const li = document.createElement("li");
          li.textContent = `User ${item.id_user}: ${item.komentar}`;
          list.appendChild(li);
        });
      })
      .catch(err => {
        console.error("ERROR:", err);
        alert("Gagal load komentar");
      });
  }

  // 🔹 TAMBAH KOMENTAR
  document.getElementById("commentForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const data = {
      id_user: document.getElementById("id_user").value,
      id_film: document.getElementById("id_film").value,
      komentar: document.getElementById("komentar").value
    };

    fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(res => {
      console.log("RESPONSE:", res);
      alert("Komentar berhasil ditambahkan!");
      loadComments();
    })
    .catch(err => {
      console.error("ERROR:", err);
      alert("Gagal tambah komentar");
    });
  });
</script>
